name: test

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Nightly contract test — catches drift between our spec and the hosted
    # endpoint at vm.massedcompute.com/api/mcp even when nothing has merged.
    - cron: "0 7 * * *"

permissions:
  contents: read

jobs:
  node:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Force bash even on Windows so the build script's `cp` / `chmod`
        # invocations resolve via Git Bash (preinstalled on the runner).
        shell: bash
        working-directory: packages/node
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/node/package-lock.json
      - run: npm ci
      - run: npm test

  python:
    name: python ${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
        working-directory: packages/python
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Sync tools.json into package
        working-directory: .
        run: node scripts/sync-tools.mjs
      - run: pip install -e ".[dev]"
      - run: pytest tests/

  contract:
    name: contract test (local + hosted)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/sync-tools.mjs
      - run: node scripts/contract-test.mjs
