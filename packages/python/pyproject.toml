[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "massed-compute-mcp"
version = "1.0.2"
description = "MCP server for the Massed Compute API."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Massed Compute" }]
requires-python = ">=3.10"
keywords = [
  "mcp",
  "model-context-protocol",
  "massed-compute",
  "gpu",
  "vm",
  "claude",
  "anthropic",
  "ai",
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "mcp>=1.0",
  "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "respx>=0.21",
]

[project.urls]
Homepage = "https://github.com/Massed-Compute/massed-compute-mcp"
Repository = "https://github.com/Massed-Compute/massed-compute-mcp.git"
Issues = "https://github.com/Massed-Compute/massed-compute-mcp/issues"
Documentation = "https://vm-docs.massedcompute.com/docs/category/mcp"

[project.scripts]
massed-compute-mcp = "massed_compute_mcp.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/massed_compute_mcp"]
# tools_spec.json is generated by ../../scripts/sync-tools.mjs before build.
# Hatchling auto-includes package-data so no extra config is needed.

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
